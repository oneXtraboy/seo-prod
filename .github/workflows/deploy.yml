name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build site
        run: |
          bash tools/build.sh

      - name: Install rsync + ssh
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 94.228.112.75 >> ~/.ssh/known_hosts

      - name: Deploy public/ to server
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" \
            public/ deploy@94.228.112.75:/var/www/seo-prod/public/
